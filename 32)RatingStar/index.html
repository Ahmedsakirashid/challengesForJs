<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: #fff;
      padding: 40px;
      display: flex;
      justify-content: center;
      flex-direction: column;
      height: 100vh;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #d7d5d5;

    }

    input{
        width: 100%;
        padding: 0.5rem;
        border-radius: 3px;
        border: none;
        font-size: 0.9rem;
        margin-bottom: 30px;
    }


    .container {
      width: 500px;
      margin: auto;
    } 

    .stars{
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .star{
      color: #ccc;
      font-size: 4rem;
    }

    .star.active {
      color: gold;
      transform: scale(1.1);
    }


    .rating-text{
      display: flex;
      justify-content: center;
      margin-top: 5rem;
      font-size: 1.5rem;
      font-weight: 600;
      color: #a4a1a1;
    }


</style>
<body>
    <div class="container">
        <h1>Rate This Product</h1>

        <div class="stars">
          <span class="star" data-value="1">★</span>
          <span class="star" data-value="2">★</span>
          <span class="star" data-value="3">★</span>
          <span class="star" data-value="4">★</span>
          <span class="star" data-value="5">★</span>
        </div>

        <div class="">
          <p class="rating-text">No Rating Selected</p>
        </div>
    </div>


<script>

  let stars = document.querySelectorAll(".star");
  let ratingText = document.querySelector(".rating-text");


  let SelectedRating = 0;

  stars.forEach((star)=>{
    star.addEventListener("click", ()=>{

      SelectedRating = Number(star.dataset.value);
      updatingRating(SelectedRating);

      ratingText.textContent = `You selected ${SelectedRating} star${SelectedRating > 1 ? "s" : ""}`
    });
  });


  function updatingRating(rating){
    stars.forEach((star)=>{
      const value = Number(star.dataset.value);

      if(value <= rating){
        star.classList.add("active");
      }
      else{
        star.classList.remove("active");
      }
    })
  }

</script>
</body>
</html>
