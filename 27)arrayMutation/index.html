<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: #fff;
      padding: 40px;
      display: flex;
      justify-content: center;
      flex-direction: column;
      height: 100vh;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #d7d5d5;
    }

    .container {
      max-width: 700px;
      margin: auto;
    } 

    .array{
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .cards{
        display: flex;
        justify-content: space-between;
        background-color: #ffffff;
        color: black;
        padding: 1rem;
        border-radius: 4px;
        font-size: 1.2rem;
        font-weight: 600;
    }  


    .cards button{
        padding: 5px 30px;
        border-radius: 4px;
        border: none;
    }

    .up {
      background: #4caf50;
      color: white;
    }

    .down {
      background: #2196f3;
      color: white;
    }

</style>
<body>
    
    <div class="container">
        <h1>Reorder Cards (Array Mutation)</h1>

        <div id="arrayMutation" class="array"></div>
    </div>

<script>
    let items = [
        'ReactJS Study',
        'HTML Learning',
        'CSS Practice',
        'Javascript Project',
        'NodeJS Backend'
    ];

    const arrayEl = document.getElementById("arrayMutation");

    function renderCard(){
        arrayEl.innerHTML = '';

        items.forEach((arr, index)=>{
            const cards = document.createElement("div");
            cards.className = 'cards';

            cards.innerHTML = `
            <p >${arr}</p>
            <div>
                <button class="up" onclick="moveUp(${index})">Up</button>
                <button class="down" onclick="moveDown(${index})">Down</button>
            </div>
            `;

            arrayEl.appendChild(cards);

        })
    }

    function moveUp(index){
        if(index === 0) return;

        [items[index], [items[index - 1]]] = [items[index - 1], [items[index]]];
        renderCard();
    }


    function moveDown(index){
        if(index === items.length - 1) return;

        [items[index], items[index + 1]] = [items[index + 1], [items[index]]]
        renderCard();
    }


    renderCard();
</script>
</body>
</html>
