<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: #fff;
      padding: 40px;
      display: flex;
      justify-content: center;
      flex-direction: column;
      height: 200vh;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #d7d5d5;

    }

    input{
        width: 100%;
        padding: 0.5rem;
        border-radius: 3px;
        border: none;
        font-size: 0.9rem;
        margin-bottom: 30px;
    }


    .container {
      width: 500px;
      margin: auto;
    } 

    .grid{
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .card{
        background-color: #090f1c;
        border-radius: 4px;
        width: 20rem;
        padding: 10px;
    }

    .card h1{
        font-size: 20px;
    }
    .card p{
        font-size: 15px;
        font-weight: 100;
    }

</style>
<body>
    
    <div class="container">
        <h1>Fetch → Render Cards</h1>

        <p id="status">Loading....</p>
        <div class="grid" id="cardContainer"></div>
    </div>

<script>
    const container = document.getElementById("cardContainer");
    const status = document.getElementById("status");

    async function  fetchData() {
        try{
            status.textContent = "Loading...";
            const res = await fetch('https://jsonplaceholder.typicode.com/posts');
            const data = await res.json();

            renderCard(data);
            status.textContent = "";
        }
        catch(err){
            status.textContent = "Failed to load data";
            console.log(err);
        }
    }


    function renderCard(items){
        container.innerHTML = "";

        items.slice(0, 12)
        .forEach((item)=>{
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
            <h1>${item.title}</h1>
            <p>${item.body}</p>
            `;

            container.appendChild(card);
        });
    }



    fetchData();
</script>
</body>
</html>
