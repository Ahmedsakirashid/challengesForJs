<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }


    body{
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(120deg, mintcream, rgb(129, 229, 179));
        background-repeat: no-repeat;
        height: 100vh;
    }

    .formInput{
        background-color: mintcream;
        max-width: 500px;
        padding: 1rem;
        border-radius: 5px;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        align-items: center;
        text-align: center;
    }

    form h1{
        margin-bottom: 2rem;
    }

    input{
        padding: 3px;
        width: 20rem;
        height: 2rem;
        border-radius: 4px;
        /* border: 2px solid #898787; */
        border: none;
        background: #dedede;
        font-size: 1rem;
    }

    input:focus{
        border: none;
    }

    button{
        padding: 5px 4rem;
        border-radius: 4px;
        border: none;
        background-color: black;
        color: white;
        font-weight: 600;
        font-size: 1.1rem;
    }

    .error{
        color: rgb(248, 68, 13);
    }

    .successMsg{
        color: rgb(4, 146, 27);
        font-size: 1.5rem;
        font-weight: 600;
    }

</style>
</head>
<body>
    
    <div class="container">
        
        <div class="formInput">
            <h1>Form Registration</h1>

            <div class="">
                <input type="email" id="email" placeholder="Enter your email">
                <div id="emailError" class="error"></div>
            </div>

            <div class="">
                <input type="number" id="number" placeholder="Enter your number">
                <div id="passwordError" class="error"></div>
            </div>

            <div class="">
                <input type="password" id="password" placeholder="Enter your password">
                <div id="numberError" class="error"></div>
            </div>

           <div class="">
                <div id="successMsg" class="successMsg"></div>
            </div>

            <div class="">
                <button onclick="validateForm()">Submit</button>
            </div>
        </div>
    </div>

<script>
    function validateForm(){
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;
        let number = document.getElementById("number").value;

        let emailError = document.getElementById("emailError");
        let passwordError = document.getElementById("passwordError");
        let numberError = document.getElementById("numberError");
        let successMsg = document.getElementById("successMsg");

        emailError.textContent = "";
        passwordError.textContent = "";
        numberError.textContent = "";
        successMsg.textContent = "";

        let isValid = true;

        if(password.length < 8){
            passwordError.textContent = 'password must at least 8 digit';
            isValid = false
        }

        let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        if(!email.match(emailPattern)){
            emailError.textContent = "Enter a valid email";
            isValid = false;
        }

        let phonePattern = /^[0-9]+$/;
        if(!number.match(phonePattern)){
            numberError.textContent = 'Only numbers are allowed';
            isValid = false;
        }


            if(isValid){
                successMsg.textContent = 'Form submitted successfully';
            }

            setTimeout(() => {
                successMsg.textContent = '';
            }, 3000);
    }
</script>
</body>
</html>
