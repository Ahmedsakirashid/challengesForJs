<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: #fff;
      padding: 40px;
      display: flex;
      justify-content: center;
      flex-direction: column;
      height: 100vh;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #d7d5d5;

    }

    input{
        width: 100%;
        padding: 0.5rem;
        border-radius: 3px;
        border: none;
        font-size: 0.9rem;
        margin-bottom: 30px;
    }


    .container {
      width: 500px;
      margin: auto;
    } 

    .grid{
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .card{
        background-color: #090f1c;
        border-radius: 4px;
        width: 20rem;
        padding: 10px;
    }

    .card h1{
        font-size: 20px;
    }
    .card p{
        font-size: 15px;
        font-weight: 100;
    }

    .visible{
        display: none;
    }

    .noResult{
         justify-content: center;
         color: #777777; 
         font-size: 1.5rem;
         font-weight: 600; 
         font-style: italic;
    }

</style>
<body>
    <div class="container">
        <h1>Search Users</h1>

        <input type="text" id="inputSearch" placeholder="Search User...">

        <div class="grid" id="grid"></div>

        <p id="noResult" class="noResult visible">Not found the users</p>
    </div>

<script>
    const users = [
      { id: 1, name: "Ali Hassan", email: "ali@gmail.com" },
      { id: 2, name: "Amina Yusuf", email: "amina@yahoo.com" },
      { id: 3, name: "Mohamed Ali", email: "mohamed@hotmail.com" },
      { id: 4, name: "Fatima Noor", email: "fatima@gmail.com" },
      { id: 5, name: "Ahmed Abdi", email: "ahmed@gmail.com" }
    ];
    const inputSearch = document.getElementById("inputSearch");
    const grid = document.getElementById("grid");
    const noResult = document.getElementById("noResult");

    function renderUsers(items){
        grid.innerHTML = "";
        if(items.length === ""){
            noResult.style.display = "block";
        }else{
            noResult.style.display = "none";
        }

        items.forEach((card)=>{
            const user = document.createElement("div");
            user.className = "card";

            user.innerHTML = `
            <h1>${card.name}</h1>
            <p>${card.email}</p>
            `;

            grid.appendChild(user);
        })

    }

    inputSearch.addEventListener("input", ()=>{
        const query = inputSearch.value.toLowerCase();
        const filtered = users.filter(user=>
            user.name.toLowerCase().includes(query) || 
            user.email.toLowerCase().includes(query)
        );

        renderUsers(filtered);
    });


    renderUsers(users);
</script>
</body>
</html>
